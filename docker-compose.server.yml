# HumanEnv Server - Docker Compose (Server Only)
# Usage:
#   SQLite mode:    docker-compose -f docker-compose.server.yml up -d
#   MongoDB mode:   docker-compose -f docker-compose.server.yml -f docker-compose.server.mongo.yml up -d

services:
  humanenv-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: humanenv-server
    restart: unless-stopped
    ports:
      - "${PORT:-3056}:3056"
    environment:
      # Server configuration
      - NODE_ENV=production
      - PORT=3056
      
      # Database configuration
      # Leave MONGODB_URI empty for SQLite mode
      # Set to MongoDB URI for MongoDB mode (e.g., mongodb://mongo:27017/humanenv)
      - MONGODB_URI=${MONGODB_URI:-}
      
      # Private Key management
      # Set this to auto-restore PK from secret (survives container restarts)
      # Generate once with: docker-compose exec humanenv-server node -e "console.log(require('./packages/shared/src/crypto.ts').generateMnemonic())"
      - HUMANENV_MNEMONIC=${HUMANENV_MNEMONIC:-}
      
      # Temporal PK - write PK to disk on shutdown to survive auto-restarts
      # Can also be enabled via admin UI Settings tab (persists to DB)
      - HUMANENV_TEMPORAL_PK=${HUMANENV_TEMPORAL_PK:-}
      
      # Basic auth for admin UI
      # Required if --basicAuth flag is used
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME:-admin}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD:-admin}
      
      # HTTPS/TLS configuration (optional)
      # Mount certificates and set paths to enable HTTPS
      - HTTPS_CERT_PATH=${HTTPS_CERT_PATH:-}
      - HTTPS_KEY_PATH=${HTTPS_KEY_PATH:-}
      
      # Data directory (SQLite storage location)
      - DATA_DIR=/data/humanenv
    volumes:
      # Persist SQLite database, credentials, and temporal PK file
      - humanenv-data:/data/humanenv
      # Optional: Mount TLS certificates
      # - ./certs:/certs:ro
    networks:
      - humanenv-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3056/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false # Set to true if you need to debug, requires tmpfs for /data
    # tmpfs:
    #   - /tmp:noexec,nosuid,size=100m

# Named volumes
volumes:
  humanenv-data:
    driver: local
    name: humanenv-data

# Networks
networks:
  humanenv-network:
    driver: bridge
    name: humanenv-network
